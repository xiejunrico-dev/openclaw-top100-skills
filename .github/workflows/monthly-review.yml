name: Monthly Top 100 Review Reminder

on:
  schedule:
    # Run on the 1st of every month at 09:00 UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  create-review-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create monthly review issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date();
            const month = date.toLocaleString('en-US', { month: 'long', year: 'numeric' });

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Monthly Review] Top 100 Skills — ${month}`,
              body: `## 🔄 Monthly Top 100 Review

This is the automated monthly reminder to review and update the Top 100 Skills list.

### Review Checklist

- [ ] Check [openclaw-master-skills](https://github.com/LeoYeAI/openclaw-master-skills) for new skills added since last month
- [ ] Review ClawHub trending skills
- [ ] Check for any skills in the current Top 100 that have broken dependencies or empty descriptions
- [ ] Evaluate open nominations from community issues
- [ ] Update \`skills/\` directory if any swaps are made
- [ ] Update \`README.md\` and \`README.zh-CN.md\`
- [ ] Add entry to \`CHANGELOG.md\`

### Evaluation Criteria

| Criterion | Check |
|---|---|
| Clear, non-empty description | ✓ |
| Cross-platform (not macOS/Windows only) | ✓ |
| No broken dependencies | ✓ |
| Active maintenance (updated < 6 months) | ✓ |

/cc @LeoYeAI
`,
              labels: ['monthly-review', 'maintenance']
            });
